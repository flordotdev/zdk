mod_name:
  type: str
  help: What is your mod name?
  default: My Mod

mod_id:
  type: str
  help: What is your mod id?
  default: MyMod
  validator: >-
    {% if not (mod_id | regex_search('^[A-Z][a-z]+(?:[A-Z][a-z]+)*$')) %}
    It's using incorrect casing, use PascalCase for mod id.
    {% endif %}

mod_visibility:
  type: str
  help: What is your mod visibility?
  choices:
    0: Public
    1: Friends Only
    2: Private
    3: Unlisted
