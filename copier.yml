mod_name:
  type: str
  help: What is your mod name?
  placeholder: My Mod
  validator: >-
    {% if not (mod_name | trim) %}
    Cannot be blank or contain only spaces
    {% endif %}

mod_id:
  type: str
  help: What is your mod id?
  placeholder: MyMod
  validator: >-
    {% if not (mod_id | regex_search('^[A-Z][a-zA-Z0-9]*$')) %}
    Use PascalCase for mod id (e.g. ExampleMod, GMOD, Awesome67).
    {% endif %}

mod_visibility:
  type: str
  help: What is your mod visibility?
  choices:
    'Public': 0
    'Friends Only': 1
    'Private': 2
    'Unlisted': 3

_subdirectory: template
